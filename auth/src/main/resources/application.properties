# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# SQL SERVER (SQL AUTHENTICATION)
# ===============================
spring.datasource.url=jdbc:sqlserver://MAQN1973\\DEV_ENV:1433;databaseName=management-system;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Maq@2025Secure!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Let Hibernate auto-detect dialect (recommended)
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===============================
# FILE UPLOAD (EXCEL)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

